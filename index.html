<!DOCTYPE html>
<html>

<head>

<title>AuroraTL</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="title">

<img src="logo.png" class="logoImg">

<h1 class="logoText">AuroraTL</h1>

</div>


<div class="adminCorner" onclick="toggleLogin()">Admin</div>

<div id="loginBox" class="loginBox hidden">

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Login</button>

</div>


<button id="addBtn" class="addBtn hidden" onclick="addPlayer()">ADD TIER</button>


<input id="search" placeholder="Buscar jugador..." onkeyup="searchPlayer()">



<div class="modes">

<button onclick="setMode('overall')">Overall</button>
<button onclick="setMode('vanilla')">Vanilla</button>
<button onclick="setMode('uhc')">UHC</button>
<button onclick="setMode('nethpot')">NethPot</button>
<button onclick="setMode('smp')">SMP</button>
<button onclick="setMode('sword')">Sword</button>
<button onclick="setMode('mace')">Mace</button>
<button onclick="setMode('mazo')">Mazo</button>

</div>


<div id="players"></div>


<script src="script.js"></script>

</body>
</html>
