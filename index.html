<!DOCTYPE html>
<html>

<head>

<title>AuroraTL</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

<div class="logoArea">

<img src="logo.png" class="logoImg">

<span class="logoText">AuroraTL</span>

</div>

<div class="rightSide">

<input id="search" placeholder="Buscar jugador..." onkeyup="render()">

<div class="adminBtn" onclick="toggleLogin()">Admin</div>

</div>

</div>


<div id="loginBox" class="loginBox hidden">

<input id="user" placeholder="Usuario">

<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Login</button>

</div>


<button id="addBtn" class="addBtn hidden" onclick="addPlayer()">ADD PLAYER</button>


<div id="players"></div>


<script src="script.js"></script>

</body>

</html>
