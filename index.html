<!DOCTYPE html>
<html>

<head>

<title>AuroraTL</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 class="title">AuroraTL</h1>

<div class="topbar">

<input id="search" placeholder="Buscar jugador..." oninput="searchPlayer()">

<div class="login">

<input id="user" placeholder="usuario">

<input id="pass" type="password" placeholder="password">

<button onclick="login()">Admin Login</button>

</div>

</div>

<div class="modes">

<button class="mode active" onclick="changeMode('overall')">Overall</button>
<button class="mode" onclick="changeMode('vanilla')">Vanilla</button>
<button class="mode" onclick="changeMode('uhc')">UHC</button>
<button class="mode" onclick="changeMode('nether')">NetherPot</button>
<button class="mode" onclick="changeMode('smp')">SMP</button>
<button class="mode" onclick="changeMode('sword')">Sword</button>
<button class="mode" onclick="changeMode('mace')">Mace</button>

</div>

<button id="addBtn" class="hidden" onclick="addTier()">ADD TIER</button>

<div id="players"></div>

<script src="script.js"></script>

</body>

</html>
