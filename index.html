<!DOCTYPE html>
<html>

<head>

<title>AuroraTL</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

<div class="logoArea">

<img src="logo.png" class="logoImg">

<span class="logoText">AuroraTL</span>

</div>


<div class="modes">

<button onclick="setMode('overall')">🏆 Overall</button>
<button onclick="setMode('sword')">⚔ Sword</button>
<button onclick="setMode('uhc')">❤️ UHC</button>
<button onclick="setMode('vanilla')">🛡 Vanilla</button>
<button onclick="setMode('nethpot')">⚗ NethPot</button>
<button onclick="setMode('smp')">🌍 SMP</button>
<button onclick="setMode('mace')">🔨 Mace</button>
<button onclick="setMode('mazo')">🪓 Mazo</button>

</div>


<div class="rightSide">

<a href="https://discord.gg/WbT6tnkG" target="_blank" class="discordBtn">
Discord
</a>

<a href="https://discord.gg/UK5zjdFs" target="_blank" class="discordBtn">
Comunidad
</a>

<input id="search" placeholder="Buscar jugador..." onkeyup="render()">

<div class="adminBtn" onclick="toggleLogin()">Admin</div>

</div>

</div>


<div id="loginBox" class="loginBox hidden">

<input id="user" placeholder="Usuario">

<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Login</button>

</div>


<button id="addBtn" class="addBtn hidden" onclick="addPlayer()">ADD PLAYER</button>


<div id="players"></div>


<div class="footer">

By Requiem

</div>


<script src="script.js"></script>

</body>

</html>
