<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>AuroraTL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">Aurora<span>TL</span></div>

</header>


<!-- MODES BAR -->

<div class="modes">

<div class="mode active">🏆 Overall</div>
<div class="mode">⚔ LTMS</div>
<div class="mode">🛡 Vanilla</div>
<div class="mode">❤️ UHC</div>
<div class="mode">🧪 Pot</div>
<div class="mode">🔥 NethOP</div>
<div class="mode">🌍 SMP</div>
<div class="mode">⚔ Sword</div>

</div>


<!-- SEARCH -->

<div class="search">

<input id="search" placeholder="Buscar jugador..." onkeyup="searchPlayer()">

</div>


<!-- PLAYERS -->

<div class="container" id="players"></div>



<!-- ADMIN PANEL -->

<div class="adminBox">

<div class="adminTitle">⚙ Admin Login</div>

<div class="adminControls">

<input id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Login</button>

</div>

<button id="addBtn" class="hidden addTierBtn" onclick="addTier()">
➕ ADD TIERS
</button>

</div>


<script src="script.js"></script>

</body>
</html>
