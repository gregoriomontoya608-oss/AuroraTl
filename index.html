<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>AuroraTL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">Aurora<span>TL</span></div>

<div class="loginCorner">

<input id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Login</button>

</div>

</header>


<!-- MODES -->

<div class="modesBar">

<div class="mode">🏆 Overall</div>
<div class="mode">⚔ LTMS</div>
<div class="mode">🛡 Vanilla</div>
<div class="mode">❤ UHC</div>
<div class="mode">🧪 Pot</div>
<div class="mode">🔥 NethOP</div>
<div class="mode">🌍 SMP</div>
<div class="mode">⚔ Sword</div>

</div>


<!-- SEARCH -->

<div class="searchBox">

<input id="search" placeholder="Buscar jugador..." onkeyup="searchPlayer()">

</div>


<button id="addBtn" class="hidden addBtn" onclick="addTier()">➕ Añadir jugador</button>


<div id="players" class="container"></div>

<script src="script.js"></script>

</body>
</html>
