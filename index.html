<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AuroraTL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">Aurora<span>TL</span></div>
</header>

<div class="modes">

<div class="mode active" onclick="changeMode('overall')">🏆 Overall</div>
<div class="mode" onclick="changeMode('vanilla')">🛡 Vanilla</div>
<div class="mode" onclick="changeMode('uhc')">❤️ UHC</div>
<div class="mode" onclick="changeMode('pot')">🧪 Pot</div>
<div class="mode" onclick="changeMode('nether')">🔥 NetherOP</div>
<div class="mode" onclick="changeMode('smp')">🌍 SMP</div>
<div class="mode" onclick="changeMode('sword')">⚔ Sword</div>

</div>

<div class="search">
<input id="search" placeholder="Buscar jugador..." onkeyup="searchPlayer()">
</div>

<div class="container" id="players"></div>

<div class="adminBox">

<div class="adminTitle">⚙ Admin Login</div>

<input id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Login</button>

<select id="modeSelect" class="hidden">

<option value="vanilla">Vanilla</option>
<option value="uhc">UHC</option>
<option value="pot">Pot</option>
<option value="nether">NetherOP</option>
<option value="smp">SMP</option>
<option value="sword">Sword</option>

</select>

<button id="addBtn" class="hidden" onclick="addTier()">ADD TIER</button>

</div>

<script src="script.js"></script>

</body>
</html>
