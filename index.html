<!-- ================= index.html ================= -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AuroraTL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">Aurora<span>TL</span></div>
<div id="loginPanel">
<input type="password" id="adminPass" placeholder="Admin password">
<button onclick="login()">Entrar</button>
</div>
</header>

<section id="adminControls" class="hidden">

<input id="nick" placeholder="Nick del jugador">

<select id="mode">
<option>Mazo</option>
<option>Diapot</option>
<option>Sword</option>
<option>CPvP</option>
<option>Nethepot</option>
<option>UHC</option>
<option>SMP</option>
</select>

<select id="tier">
<option>HT1</option>
<option>LT1</option>
<option>LT2</option>
<option>HT2</option>
<option>HT3</option>
<option>LT3</option>
<option>HT4</option>
<option>LT4</option>
<option>HT5</option>
<option>LT5</option>
</select>

<button onclick="addTier()">Añadir Tier</button>

</section>

<div class="container" id="players"></div>

<script src="script.js"></script>
</body>
</html>
